<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>City Realm - Telegram Mini App</title>
    <link rel="stylesheet" href="./styles.css?v=4" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <button class="close-btn" type="button">Close</button>
        <div class="hud-right">
          <div class="resources" id="resourceBar"></div>
          <div class="hero-card" id="heroCard">
            <div class="hero-avatar">🛡️</div>
            <div class="hero-meta">
              <div class="hero-level" id="heroLevel">Lv. 1</div>
              <div class="hero-power" id="heroPower">Power 0</div>
            </div>
          </div>
        </div>
      </header>

      <main class="map-wrap">
        <section class="map" id="map"></section>
      </main>

      <section class="panel hidden" id="buildingPanel" aria-live="polite">
        <div class="panel-head">
          <h2 id="panelTitle"></h2>
          <div class="panel-head-right">
            <span id="panelLevel"></span>
            <button class="panel-close" id="panelClose" type="button">✕</button>
          </div>
        </div>
        <p id="panelDesc"></p>
        <div class="panel-production" id="panelProduction"></div>
        <div class="cost-row" id="panelCost"></div>
        <button class="action-btn" id="panelAction" type="button"></button>
        <div class="panel-rules" id="panelRules"></div>
        <p class="status-line" id="statusLine"></p>
      </section>

      <nav class="bottom-nav">
        <button class="tab tab-active" type="button">City</button>
        <button class="tab" type="button">Battles</button>
        <button class="tab" type="button">Clan</button>
        <button class="tab" type="button">Quests</button>
      </nav>
    </div>

    <template id="buildingTemplate">
      <div class="building-node">
        <button class="building" type="button">
          <div class="building-icon"></div>
          <div class="building-badge"></div>
        </button>
        <div class="upgrade-timer hidden"></div>
        <button class="collect-btn hidden" type="button"></button>
      </div>
    </template>

    <script type="module" src="./app.js?v=4"></script>
  </body>
</html>
